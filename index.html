<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏰 Crystal Survivors</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { 
            border: 2px solid #FFD700; 
            display: block;
            background: #1a1a2e;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <script>
        console.log('🚀 Игра запускается...');
        
        // ==================== НАСТРОЙКИ ====================
        const CONFIG = {
            SIZE_X: 25, SIZE_Y: 18, CELL: 32,
            DAY_DURATION: 60, NIGHT_DURATION: 30,
            START_WOOD: 5, START_STONE: 3, START_CRYSTALS: 2,
            WOOD_WALL_COST: 3, STONE_WALL_COST: 5
        };
        
        // ==================== CANVAS ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth - 20, 1000);
            const maxH = Math.min(window.innerHeight - 20, 700);
            const ratio = CONFIG.SIZE_X / CONFIG.SIZE_Y;
            
            let w, h;
            if (maxW / maxH > ratio) {
                h = maxH;
                w = h * ratio;
            } else {
                w = maxW;
                h = w / ratio;
            }
            
            CONFIG.CELL = Math.floor(Math.max(w / CONFIG.SIZE_X, 20));
            canvas.width = CONFIG.CELL * CONFIG.SIZE_X;
            canvas.height = CONFIG.CELL * CONFIG.SIZE_Y + 70;
            
            console.log('📐 Canvas:', canvas.width, 'x', canvas.height);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        let gameState = 'menu'; // menu, day, night, game_over
        let currentNight = 1;
        let timeLeft = CONFIG.DAY_DURATION;
        let woodCount = 5;
        let stoneCount = 3;
        let crystals = 2;
        let blueX = 12;
        let blueY = 9;
        let reds = [];
        let walls = [];
        let score = 0;
        let bestScore = 0;
        
        // ==================== ГЕНЕРАЦИЯ ====================
        function startDay() {
            gameState = 'day';
            timeLeft = CONFIG.DAY_DURATION;
            reds = [];
            walls = [];
            
            // Случайные стены для теста
            for (let i = 0; i < 15; i++) {
                const x = Math.floor(Math.random() * (CONFIG.SIZE_X - 2)) + 1;
                const y = Math.floor(Math.random() * (CONFIG.SIZE_Y - 2)) + 1;
                if (x !== blueX || y !== blueY) {
                    walls.push({x, y, hp: 100});
                }
            }
            
            console.log('☀️ День', currentNight, '- Стен:', walls.length);
        }
        
        function startNight() {
            gameState = 'night';
            timeLeft = CONFIG.NIGHT_DURATION;
            
            const count = 3 + Math.floor((currentNight - 1) / 2);
            reds = [];
            
            for (let i = 0; i < count; i++) {
                let x, y;
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { x = Math.floor(Math.random() * 23) + 1; y = 1; }
                else if (side === 1) { x = Math.floor(Math.random() * 23) + 1; y = 16; }
                else if (side === 2) { x = 1; y = Math.floor(Math.random() * 16) + 1; }
                else { x = 23; y = Math.floor(Math.random() * 16) + 1; }
                
                reds.push({x, y, hp: 3 + (currentNight - 1)});
            }
            
            console.log('🌙 Ночь', currentNight, '- Красных:', reds.length);
        }
        
        function startGame() {
            console.log('🎮 НАЧАЛО ИГРЫ');
            currentNight = 1;
            woodCount = 5;
            stoneCount = 3;
            crystals = 2;
            blueX = 12;
            blueY = 9;
            score = 0;
            startDay();
        }
        
        // ==================== ДВИЖЕНИЕ ====================
        function moveBlue(dx, dy) {
            const nx = blueX + dx;
            const ny = blueY + dy;
            
            // Проверка границ
            if (nx < 0 || nx >= CONFIG.SIZE_X || ny < 0 || ny >= CONFIG.SIZE_Y) return;
            
            // Проверка стен
            if (walls.some(w => w.x === nx && w.y === ny)) return;
            
            blueX = nx;
            blueY = ny;
            
            // Проверка столкновения с красными
            if (gameState === 'night') {
                for (const red of reds) {
                    if (Math.abs(red.x - blueX) < 1 && Math.abs(red.y - blueY) < 1) {
                        gameState = 'game_over';
                        score = currentNight - 1;
                        if (score > bestScore) {
                            bestScore = score;
                            localStorage.setItem('cs_best', bestScore);
                        }
                        console.log('💀 ПОРАЖЕНИЕ! Ночей:', score);
                    }
                }
            }
        }
        
        // ==================== ОБНОВЛЕНИЕ ====================
        function update(dt) {
            if (gameState === 'day' || gameState === 'night') {
                timeLeft -= dt;
                
                if (timeLeft <= 0) {
                    if (gameState === 'day') {
                        currentNight++;
                        startNight();
                    } else {
                        startDay();
                    }
                }
            }
            
            // Движение красных
            if (gameState === 'night') {
                for (const red of reds) {
                    if (Math.random() < 0.05) {
                        const dx = Math.sign(blueX - red.x) * (Math.random() < 0.7 ? 1 : 0);
                        const dy = Math.sign(blueY - red.y) * (Math.random() < 0.7 ? 0 : 1);
                        
                        const nx = red.x + (Math.random() < 0.5 ? dx : 0);
                        const ny = red.y + (Math.random() < 0.5 ? dy : 0);
                        
                        if (nx >= 0 && nx < CONFIG.SIZE_X && ny >= 0 && ny < CONFIG.SIZE_Y) {
                            if (!walls.some(w => w.x === Math.round(nx) && w.y === Math.round(ny))) {
                                red.x = nx;
                                red.y = ny;
                            }
                        }
                    }
                    
                    // Проверка столкновения
                    if (Math.abs(red.x - blueX) < 0.8 && Math.abs(red.y - blueY) < 0.8) {
                        gameState = 'game_over';
                        score = currentNight - 1;
                        if (score > bestScore) {
                            bestScore = score;
                            localStorage.setItem('cs_best', bestScore);
                        }
                        console.log('💀 ПОРАЖЕНИЕ!');
                    }
                }
            }
        }
        
        // ==================== ОТРИСОВКА ====================
        function draw() {
            const C = CONFIG.CELL;
            
            // Очистка
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'menu') {
                drawMenu();
                return;
            }
            
            // Сетка
            for (let y = 0; y < CONFIG.SIZE_Y; y++) {
                for (let x = 0; x < CONFIG.SIZE_X; x++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#2d5a2c' : '#1e4a1e';
                    ctx.fillRect(x * C, y * C, C, C);
                }
            }
            
            // Стены
            for (const wall of walls) {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(wall.x * C + 2, wall.y * C + 2, C - 4, C - 4);
                ctx.strokeStyle = '#654321';
                ctx.strokeRect(wall.x * C + 2, wall.y * C + 2, C - 4, C - 4);
            }
            
            // Ресурсы (случайные)
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < 10; i++) {
                const x = ((i * 137 + 50) % CONFIG.SIZE_X) * C + C/2;
                const y = ((i * 97 + 30) % CONFIG.SIZE_Y) * C + C/2;
                ctx.beginPath();
                ctx.arc(x, y, C * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Синий игрок
            const bx = blueX * C + C/2;
            const by = blueY * C + C/2;
            
            ctx.fillStyle = '#4488FF';
            ctx.beginPath();
            ctx.arc(bx, by, C * 0.4, 0, Math.PI * 2);
            ctx.fill();
            
            // Глаза
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(bx - C * 0.12, by - C * 0.08, C * 0.1, 0, Math.PI * 2);
            ctx.arc(bx + C * 0.12, by - C * 0.08, C * 0.1, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bx - C * 0.12, by - C * 0.08, C * 0.05, 0, Math.PI * 2);
            ctx.arc(bx + C * 0.12, by - C * 0.08, C * 0.05, 0, Math.PI * 2);
            ctx.fill();
            
            // Красные враги
            for (const red of reds) {
                const rx = red.x * C + C/2;
                const ry = red.y * C + C/2;
                
                ctx.fillStyle = '#FF3333';
                ctx.beginPath();
                ctx.arc(rx, ry, C * 0.35, 0, Math.PI * 2);
                ctx.fill();
                
                // HP
                ctx.fillStyle = 'white';
                ctx.font = `bold ${Math.max(10, C * 0.3)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(`♥${red.hp}`, rx, ry - C * 0.2);
                ctx.textAlign = 'left';
            }
            
            // UI панель
            drawUI();
            
            // Game Over
            if (gameState === 'game_over') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('💀 ПОРАЖЕНИЕ 💀', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = 'white';
                ctx.font = '18px Arial';
                ctx.fillText(`Ночей: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
                ctx.fillText('R / Клик - Рестарт', canvas.width / 2, canvas.height / 2 + 55);
                ctx.textAlign = 'left';
            }
        }
        
        function drawUI() {
            const uy = CONFIG.CELL * CONFIG.SIZE_Y;
            const C = CONFIG.CELL;
            
            // Фон UI
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, uy, canvas.width, 70);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, uy, canvas.width, 70);
            
            // Информация
            ctx.fillStyle = gameState === 'day' ? '#FFD700' : '#8B6CFF';
            ctx.font = 'bold 14px Arial';
            const phaseText = gameState === 'day' ? '☀️ ДЕНЬ' : '🌙 НОЧЬ';
            ctx.fillText(`${phaseText} ${currentNight}`, 10, uy + 25);
            
            ctx.fillStyle = '#FF4444';
            ctx.fillText(`👹 ${reds.length}`, 150, uy + 25);
            
            ctx.fillStyle = '#8B6914';
            ctx.fillText(`🪵 ${woodCount}`, 230, uy + 25);
            
            ctx.fillStyle = '#A0A0A0';
            ctx.fillText(`🪨 ${stoneCount}`, 300, uy + 25);
            
            ctx.fillStyle = '#FFD700';
            ctx.fillText(`💎 ${crystals}`, 370, uy + 25);
            
            // Таймер
            const mins = Math.floor(timeLeft / 60);
            const secs = Math.floor(timeLeft % 60);
            ctx.fillStyle = '#FFE66D';
            ctx.fillText(`⏱ ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`, canvas.width - 120, uy + 25);
            
            // Прогресс-бар
            const maxTime = gameState === 'day' ? CONFIG.DAY_DURATION : CONFIG.NIGHT_DURATION;
            const barW = (timeLeft / maxTime) * (canvas.width - 200);
            ctx.fillStyle = '#333';
            ctx.fillRect(60, uy + 35, canvas.width - 200, 8);
            ctx.fillStyle = gameState === 'day' ? '#FFD700' : '#8B3A3A';
            ctx.fillRect(60, uy + 35, barW, 8);
            
            // Рекорд
            ctx.fillStyle = '#FFD700';
            ctx.font = '11px Arial';
            ctx.fillText(`🏆 ${bestScore}`, canvas.width - 140, uy + 55);
        }
        
        function drawMenu() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // Фон
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Заголовок
            ctx.fillStyle = '#FFD700';
            ctx.font = `bold ${Math.min(36, canvas.width / 15)}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('🏰 CRYSTAL SURVIVORS 🏰', cx, cy - 100);
            
            // Подсказка
            ctx.fillStyle = 'white';
            ctx.font = `${Math.min(16, canvas.width / 35)}px Arial`;
            ctx.fillText('Строй защиту, переживи ночи!', cx, cy - 50);
            
            // Кнопка
            const btnW = 250, btnH = 55;
            const btnX = cx - btnW/2, btnY = cy - 20;
            
            ctx.fillStyle = '#2a2a3a';
            ctx.fillRect(btnX, btnY, btnW, btnH);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.strokeRect(btnX, btnY, btnW, btnH);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 22px Arial';
            ctx.fillText('▶ НАЧАТЬ ИГРУ', cx, btnY + 38);
            
            // Управление
            ctx.fillStyle = '#AAAAAA';
            ctx.font = '14px Arial';
            ctx.fillText('WASD/Стрелки - движение', cx, cy + 70);
            ctx.fillText('E - сбор ресурсов', cx, cy + 95);
            ctx.fillText('R - рестарт', cx, cy + 120);
            
            if (bestScore > 0) {
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(`🏆 Лучший результат: ${bestScore} ночей`, cx, cy + 155);
            }
            
            ctx.textAlign = 'left';
        }
        
        // ==================== УПРАВЛЕНИЕ ====================
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (gameState === 'game_over') {
                if (key === 'r') startGame();
                return;
            }
            
            if (gameState === 'menu') {
                if (key === 'enter' || key === ' ') startGame();
                return;
            }
            
            if (gameState !== 'day' && gameState !== 'night') return;
            
            if (key === 'e') {
                // Сбор ресурсов (заглушка)
                console.log('Сбор ресурсов');
                return;
            }
            
            if (key === 'r') {
                startGame();
                return;
            }
            
            let dx = 0, dy = 0;
            if (key === 'w' || key === 'arrowup') dy = -1;
            else if (key === 's' || key === 'arrowdown') dy = 1;
            else if (key === 'a' || key === 'arrowleft') dx = -1;
            else if (key === 'd' || key === 'arrowright') dx = 1;
            else return;
            
            e.preventDefault();
            moveBlue(dx, dy);
        });
        
        canvas.addEventListener('click', (e) => {
            if (gameState === 'menu' || gameState === 'game_over') {
                startGame();
                return;
            }
        });
        
        // ==================== ИГРОВОЙ ЦИКЛ ====================
        let lastTime = performance.now();
        
        function gameLoop(currentTime) {
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1); // Ограничение dt
            lastTime = currentTime;
            
            update(dt);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== ЗАПУСК ====================
        console.log('✅ Инициализация завершена');
        
        // Загружаем рекорд
        bestScore = parseInt(localStorage.getItem('cs_best') || '0');
        
        // Показываем меню
        gameState = 'menu';
        
        // Запускаем цикл
        requestAnimationFrame(gameLoop);
        
        console.log('🎮 Игра готова! Нажмите Enter или кликните для старта');
    </script>
</body>
</html>
